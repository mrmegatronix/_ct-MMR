<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://*.google.com https://*.googleusercontent.com https://*.firebaseio.com;">
    <title>Monster Meat Raffle - Display</title>
    <script src="config.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');

        :root {
            --primary: var(--cfg-primary, #ef4444);
            --primary-glow: var(--cfg-primary-glow, rgba(239, 68, 68, 0.6));
            --bg-dark: var(--cfg-bg-dark, #020617);
            --bg-grad: var(--cfg-bg-grad, radial-gradient(circle at center, #1e293b 0%, #020617 100%));
            --text-light: var(--cfg-text-light, #f8fafc);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg-dark);
            color: var(--text-light);
            font-family: 'Outfit', sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Branding Top Left */
        .brand-logo {
            position: absolute;
            top: 2rem;
            left: 2rem;
            width: 165px;
            z-index: 1000;
            filter: drop-shadow(0 0 20px rgba(0,0,0,0.8));
        }

        /* Global Countdown (Hidden as per request, now a slide) */
        .global-countdown {
            display: none;
        }

        /* Container for Views */
        #view-container {
            flex: 1;
            position: relative;
            background: var(--bg-grad);
        }

        .view {
            position: absolute;
            inset: 0;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1s ease-in-out;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .view.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* --- SLIDES VIEW --- */
        .slide {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            opacity: 0;
            transform: scale(1.05);
            transition: opacity 1.5s ease-in-out, transform 1.5s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 4rem;
            padding-top: 25vh; /* heavily push content down to avoid header */
        }
        .slide.active { opacity: 1; transform: scale(1); }

        .slides-fixed-title {
            position: absolute;
            top: 3vmin;
            width: 100%;
            text-align: center;
            font-size: clamp(3.168rem, 9.504vmin, 7.92rem);
            font-weight: 900;
            line-height: 1.1;
            color: #f8fafc;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            text-shadow: 0 0 20px var(--primary-glow), 0 0 40px var(--primary-glow), 0 5px 20px rgba(0,0,0,0.8);
            z-index: 100;
            animation: title-pulse 3s infinite ease-in-out;
        }

        .slide-subtitle {
            font-size: clamp(1.4rem, 6vmin, 5.5rem);
            color: var(--primary);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            text-shadow: 0 0 10px rgba(255,255,255,0.9), 0 0 25px rgba(255,255,255,0.6), 0 0 40px var(--primary-glow), 0 2px 12px rgba(0,0,0,0.95);
            margin-top: 1rem;
            animation: subtitle-pulse 3s infinite ease-in-out;
            text-wrap: balance;
            hyphens: auto;
            text-align: justify;
            max-width: 85%;
            line-height: 1.3;
            position: relative;
            z-index: 2;
        }

        .slide-countdown {
            font-size: clamp(1.92rem, 6.6vmin, 6rem);
            font-weight: 900;
            color: var(--primary);
            text-shadow: 0 0 10px rgba(255,255,255,0.9), 0 0 25px rgba(255,255,255,0.6), 0 0 40px var(--primary-glow), 0 10px 20px rgba(0,0,0,0.5);
            margin-top: 1rem;
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.02em;
            white-space: nowrap;
            position: relative;
            z-index: 2;
            display: inline-block;
            transform: scaleY(1.1);
        }

        @keyframes title-pulse {
            0%, 100% { text-shadow: 0 0 20px var(--primary-glow), 0 0 40px var(--primary-glow), 0 5px 20px rgba(0,0,0,0.8); }
            50% { text-shadow: 0 0 30px var(--primary), 0 0 60px var(--primary-glow), 0 5px 20px rgba(0,0,0,0.8); }
        }

        @keyframes subtitle-pulse {
            0%, 100% { text-shadow: 0 0 10px rgba(255,255,255,0.9), 0 0 25px rgba(255,255,255,0.6), 0 0 40px var(--primary-glow), 0 2px 12px rgba(0,0,0,0.95); }
            50% { text-shadow: 0 0 20px rgba(255,255,255,1), 0 0 40px rgba(255,255,255,0.8), 0 0 60px var(--primary), 0 2px 12px rgba(0,0,0,0.95); }
        }

        @keyframes colon-flash {
            0%, 49.9% { opacity: 1; }
            50%, 100% { opacity: 0; }
        }
        .colon-flash {
            animation: colon-flash 1s step-start infinite;
            display: inline-block;
            margin: 0 0.2em;
            color: var(--primary);
        }

        .ambient-confetti {
            position: absolute;
            pointer-events: none;
            z-index: 10;
        }

        .slide h1 {
            font-size: clamp(3.3rem, 11.88vmin, 10.56rem);
            font-weight: 900;
            color: var(--primary);
            text-transform: uppercase;
            line-height: 1.1;
            text-shadow: 0 0 10px rgba(255,255,255,0.9), 0 0 25px rgba(255,255,255,0.6), 0 0 40px var(--primary-glow), 0 2px 10px rgba(0,0,0,0.9);
            margin-bottom: 1.5rem;
            position: relative;
            z-index: 2;
            text-wrap: balance;
            max-width: 90%;
        }
        .slide .highlight { 
            color: var(--primary); 
            text-shadow: 0 0 10px rgba(255,255,255,0.9), 0 0 25px rgba(255,255,255,0.6);
        }
        .slide-image-overlay {
            position: absolute;
            inset: 0;
            background: rgba(2, 6, 23, 0.65);
            z-index: 1;
        }

        /* Avatar styling */
        .avatar-container {
            margin-top: 3rem;
            position: relative;
            z-index: 5;
            display: flex;
            justify-content: center;
        }
        .animated-avatar {
            width: 380px;
            height: 380px;
            object-fit: contain;
            border-radius: 50%;
            border: 6px solid var(--primary);
            box-shadow: 0 0 40px var(--primary-glow), 0 0 80px rgba(0,0,0,0.8);
            animation: float 4s ease-in-out infinite;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        .speech-bubble {
            position: absolute;
            top: -60px;
            right: -100px;
            background: white;
            color: var(--primary);
            padding: 1rem 1.5rem;
            border-radius: 20px;
            font-weight: 800;
            font-size: 1.5rem;
            text-shadow: 0 0 5px rgba(255,255,255,0.8);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            animation: float-bubble 4s ease-in-out infinite;
            z-index: 10;
        }
        .speech-bubble::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 30px;
            border-width: 15px 15px 0 0;
            border-style: solid;
            border-color: white transparent transparent transparent;
        }
        @keyframes float-bubble {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* Progress Bar */
        #progress-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 12px; /* Thicker for TV visibility */
            background: rgba(255,255,255,0.05);
            z-index: 100;
        }
        #progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ef4444, #f87171);
            box-shadow: 0 0 15px var(--primary);
            transition: width 0.1s linear;
        }

        /* --- DRAW VIEW --- */
        .lottery-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
            z-index: 10;
        }
        .draw-title { 
            font-size: 4.4vmin; 
            font-weight: 900; 
            color: white; 
            text-transform: uppercase; 
            text-shadow: 0 0 15px var(--primary-glow);
        }
        .number-display {
            font-size: 24vmin;
            font-weight: 900;
            color: white;
            text-shadow: 0 0 30px var(--primary), 0 0 80px var(--primary-glow), 0 0 120px var(--primary);
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(20px);
            padding: 3vmin 8vmin;
            border-radius: 4rem;
            border: 6px solid var(--primary);
            box-shadow: 0 0 50px var(--primary-glow), inset 0 0 30px var(--primary-glow);
            min-width: 600px;
            text-align: center;
            line-height: 1;
            animation: epic-pulse 2s infinite alternate;
        }
        @keyframes epic-pulse {
            from { text-shadow: 0 0 30px var(--primary), 0 0 80px var(--primary-glow), 0 0 120px var(--primary); box-shadow: 0 0 50px var(--primary-glow), inset 0 0 30px var(--primary-glow); transform: scale(1); }
            to { text-shadow: 0 0 50px #fff, 0 0 100px var(--primary), 0 0 150px var(--primary); box-shadow: 0 0 80px var(--primary), inset 0 0 50px var(--primary-glow); transform: scale(1.05); }
        }
        .number-display.rolling {
            animation: slot-blur 0.1s infinite alternate;
            color: #ffffff;
            text-shadow: 0 0 20px rgba(255,255,255,0.8);
            border-color: rgba(255,255,255,0.4);
            box-shadow: 0 0 30px rgba(255,255,255,0.2);
            transform: scale(1);
        }
        @keyframes slot-blur {
            from { transform: scale(0.98) translateY(-8px); filter: blur(2px); }
            to { transform: scale(1.02) translateY(8px); filter: blur(4px); }
        }

        .draw-flash-bg::after {
            content: ''; position: absolute; inset: 0; pointer-events: none;
            animation: draw-spotlight 0.3s infinite alternate;
            z-index: 1;
        }
        @keyframes draw-spotlight {
            from { box-shadow: inset 0 0 50px rgba(239, 68, 68, 0.3); background: rgba(239,68,68,0.05); }
            to { box-shadow: inset 0 0 300px rgba(239, 68, 68, 0.8); background: rgba(239,68,68,0.15); }
        }
        
        .winner-gold-bg::after {
            content: ''; position: absolute; inset: 0; pointer-events: none;
            animation: gold-flash 2.5s ease-out forwards;
            z-index: 1;
        }
        @keyframes gold-flash {
            0% { box-shadow: inset 0 0 500px rgba(255,215,0,0.8); background: rgba(255,215,0,0.4); }
            100% { box-shadow: inset 0 0 0 rgba(255,215,0,0); background: transparent; }
        }

        .drawn-numbers-bar {
            position: absolute;
            bottom: 2rem;
            left: 2rem;
            right: 2rem;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            padding: 1.5rem;
            border-radius: 1rem;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .drawn-numbers-bar .title { font-size: 1.32rem; color: #94a3b8; text-transform: uppercase; font-weight: 700; }
        .drawn-list {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: center;
            font-size: 2.2rem;
            font-weight: 700;
            color: #fff;
        }
        .drawn-list span {
            background: var(--primary);
            padding: 0.5rem 1.5rem;
            border-radius: 0.5rem;
            box-shadow: 0 0 10px var(--primary-glow);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .prizes-left {
            position: absolute;
            top: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            padding: 1rem 3rem;
            border-radius: 2rem;
            border: 2px solid var(--primary);
            text-align: center;
            box-shadow: 0 0 20px var(--primary-glow);
        }
        .prizes-left .label { 
            font-size: 1.32rem; 
            color: white; 
            text-transform: uppercase; 
            font-weight: 700; 
            text-shadow: 0 0 10px var(--primary-glow);
        }
        .prizes-left .value { 
            font-size: 3.8rem; 
            font-weight: 900; 
            color: white; 
            text-shadow: 0 0 20px #fff, 0 0 40px var(--primary), 0 0 60px var(--primary-glow);
            animation: prizes-glow 2s infinite alternate;
        }
        @keyframes prizes-glow {
            from { text-shadow: 0 0 10px #fff, 0 0 20px var(--primary); }
            to { text-shadow: 0 0 25px #fff, 0 0 50px var(--primary), 0 0 80px var(--primary); }
        }

        /* --- CONGRATS VIEW --- */
        .congrats-title {
            font-size: 12vmin;
            font-weight: 900;
            color: white;
            text-shadow: 0 0 30px var(--primary-glow), 0 0 60px var(--primary-glow);
            text-transform: uppercase;
            text-align: center;
            margin-bottom: 2rem;
            animation: bounce 2s infinite;
            line-height: 1.1;
        }
        .congrats-subtitle {
            font-size: 5vmin;
            color: #fff;
            text-shadow: 0 0 15px var(--primary-glow);
            text-align: center;
            max-width: 80%;
            line-height: 1.4;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        /* Confetti Canvas */
        #confetti-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 50;
        }

        /* Slide Controls Overlay */
        #slide-controls-overlay {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            border-radius: 4rem;
            display: flex;
            gap: 2rem;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease-in-out;
            z-index: 2000;
            border: 2px solid var(--primary);
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        #view-container:hover #slide-controls-overlay {
            opacity: 1;
        }
        .control-btn {
            background: none;
            border: none;
            color: white;
            font-size: 2rem;
            cursor: pointer;
            transition: transform 0.2s, color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .control-btn:hover {
            color: var(--primary);
            transform: scale(1.2);
        }
        .control-btn:active {
            transform: scale(0.9);
        }

        /* Winners Carousel */
        .winners-carousel img {
            animation: winner-fade 10s infinite;
            opacity: 0;
            position: absolute;
        }
        @keyframes winner-fade {
            0%, 10% { opacity: 0; transform: scale(0.9); }
            15%, 85% { opacity: 1; transform: scale(1); }
            90%, 100% { opacity: 0; transform: scale(1.1); }
        }
        /* Stagger the images based on index */
        .winners-carousel img:nth-child(1) { animation-delay: 0s; }
        .winners-carousel img:nth-child(2) { animation-delay: 1.5s; }
        .winners-carousel img:nth-child(3) { animation-delay: 3s; }
        .winners-carousel img:nth-child(4) { animation-delay: 4.5s; }
        .winners-carousel img:nth-child(5) { animation-delay: 6s; }
        .winners-carousel img:nth-child(6) { animation-delay: 7.5s; }
    </style>
</head>
<body>

    <img src="logo-new.png" alt="Logo" class="brand-logo" id="logo">

    <div id="view-container">
        
        <!-- SLIDES VIEW -->
        <div id="view-slides" class="view active">
            <!-- Ambient Slides Confetti -->
            <div id="ambient-confetti-container" style="position: absolute; inset: 0; pointer-events: none; overflow: hidden; z-index: 5;"></div>
            
            <div class="slides-fixed-title" id="fixed-title-main"></div>
            <div id="slides-wrapper"></div>
            <div id="progress-container"><div id="progress-bar"></div></div>
        </div>

        <!-- DRAW VIEW -->
        <div id="view-draw" class="view">
            <div class="prizes-left">
                <div class="label">Prizes Left</div>
                <div class="value" id="prizes-count">0</div>
            </div>
            
            <div class="lottery-container">
                <div class="draw-title">Winning Number</div>
                <div class="number-display" id="lottery-number">---</div>
            </div>

            <div class="drawn-numbers-bar">
                <div class="title">Previously Drawn Numbers</div>
                <div class="drawn-list" id="drawn-list">
                    <!-- Numbers go here -->
                </div>
            </div>
        </div>

        <!-- CONGRATS VIEW -->
        <div id="view-congrats" class="view">
            <div class="congrats-title">Congratulations<br>to all the winners</div>
            <div class="congrats-subtitle">Thank you to all who participated.<br>We hope to see you all next Thursday!</div>
        </div>

        <!-- Slide Controls Overlay (Only on Display) -->
        <div id="slide-controls-overlay">
            <button class="control-btn" onclick="prevSlide()" title="Previous Slide">⏮</button>
            <button class="control-btn" id="play-pause-btn" onclick="toggleSlidePlay()" title="Play/Pause">⏸</button>
            <button class="control-btn" onclick="nextSlide()" title="Next Slide">⏭</button>
        </div>

    </div>

    <!-- Confetti logic -->
    <div id="confetti-container" style="position: absolute; inset: 0; pointer-events: none; z-index: 50; overflow: hidden;"></div>

    <script>
        // ── Security Helpers ─────────────────────────────────────────────
        function sanitize(str) {
            if (!str) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#x27;');
        }
        function safeUrl(url) {
            if (!url) return '';
            const u = String(url).trim();
            // Allow relative paths (e.g. 'avatar.png') and http(s)
            return /^(https?:\/\/|\/|\.)/i.test(u) ? u : u; // Be more permissive for local assets
        }

        function getNZDate() {
            const tz = (window.MMR_CONFIG && window.MMR_CONFIG.TIMEZONE) || 'Pacific/Auckland';
            const parts = new Intl.DateTimeFormat('en-US', {
                timeZone: tz,
                year: 'numeric', month: 'numeric', day: 'numeric',
                hour: 'numeric', minute: 'numeric', second: 'numeric',
                hourCycle: 'h23'
            }).formatToParts(new Date());
            const v = {};
            parts.forEach(p => v[p.type] = p.value);
            return new Date(v.year, v.month - 1, v.day, v.hour, v.minute, v.second);
        }

        function getNextThursday7PM() {
            const nzDate = getNZDate();
            const targetDay = (window.MMR_CONFIG && window.MMR_CONFIG.TARGET_DAY) ?? 4;
            const targetHour = (window.MMR_CONFIG && window.MMR_CONFIG.TARGET_HOUR) ?? 19;
            
            let daysUntilTarget = (targetDay + 7 - nzDate.getDay()) % 7;
            if (daysUntilTarget === 0 && nzDate.getHours() >= targetHour) {
                daysUntilTarget = 7;
            }
            nzDate.setDate(nzDate.getDate() + daysUntilTarget);
            
            const yr = nzDate.getFullYear();
            const mo = String(nzDate.getMonth() + 1).padStart(2, '0');
            const da = String(nzDate.getDate()).padStart(2, '0');
            const hr = String(targetHour).padStart(2, '0');
            return `${yr}-${mo}-${da}T${hr}:00`;
        }

        // State
        let state = {
            activeView: 'slides',
            nextDrawTime: getNextThursday7PM(),
            slides: [], // Start empty, rely ONLY on GSheets
            draw: {
                isRolling: false,
                currentNumber: '---',
                drawnNumbers: [],
                prizesLeft: (window.MMR_CONFIG && window.MMR_CONFIG.DEFAULT_PRIZE_COUNT) || 62
            }
        };

        // DOM Elements
        const views = {
            slides: document.getElementById('view-slides'),
            draw: document.getElementById('view-draw'),
            congrats: document.getElementById('view-congrats')
        };
        const slidesWrapper = document.getElementById('slides-wrapper');
        const progressBar = document.getElementById('progress-bar');
        const lottoNumberEl = document.getElementById('lottery-number');
        const drawnListEl = document.getElementById('drawn-list');
        const prizesCountEl = document.getElementById('prizes-count');
        const confettiContainer = document.getElementById('confetti-container');

        // Broadcast Channel setup
        const bc = new BroadcastChannel('mmr_sync');
        bc.onmessage = (event) => {
            const data = event.data;
            if (data.type === 'STATE_UPDATE') {
                updateState(data.payload);
            }
            if (data.type === 'START_ROLL') {
                startLotteryRoll();
            }
            if (data.type === 'STOP_ROLL') {
                stopLotteryRoll(data.payload.number);
            }
            if (data.type === 'CONFETTI') {
                triggerConfetti();
            }
            if (data.type === 'VOICE_TOGGLE') {
                localStorage.setItem('mmr_voice_on', data.payload.voiceOn);
            }
            if (data.type === 'SLIDE_CMD') {
                handleSlideCmd(data.payload.cmd);
            }
        };

        function handleSlideCmd(cmd) {
            if (cmd === 'next') nextSlide();
            if (cmd === 'prev') prevSlide();
            if (cmd === 'toggle') toggleSlidePlay();
        }

        function updateState(newState) {
            // Deep merge draw object if present
            if (newState.draw) {
                state.draw = { ...state.draw, ...newState.draw };
                delete newState.draw;
            }
            state = { ...state, ...newState };
            
            // View switching
            Object.keys(views).forEach(k => {
                if (k === state.activeView) views[k].classList.add('active');
                else views[k].classList.remove('active');
            });

            // Slides rendering
            if (state.activeView === 'slides') {
                renderSlides(state.slides);
            }

            // Draw rendering
            prizesCountEl.innerText = state.draw.prizesLeft;
            
            // Only update drawn list if it changed
            if (drawnListEl.children.length !== state.draw.drawnNumbers.length) {
                drawnListEl.innerHTML = state.draw.drawnNumbers.map(n => `<span>${n}</span>`).join('');
            }

            // Persist to localStorage
            localStorage.setItem('mmr_state_v5', JSON.stringify(state));
        }

        // Live Clock logic for dynamic values
        function calculateTimeRemainingHTML() {
            if (!state.nextDrawTime) return '<span>Starting Soon!</span>';
            const target = new Date(state.nextDrawTime); 
            const nzNow = getNZDate();
            
            const diff = target.getTime() - nzNow.getTime();
            if (diff <= 0) return '<span>Starting Now!</span>';
            
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hrs = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const m = Math.floor((diff / 1000 / 60) % 60);
            const s = Math.floor((diff / 1000) % 60);
            
            const c = '<span class="colon-flash">:</span>';
            
            if (days > 0) return `${days} Days${c}${hrs} Hours${c}${m} Minutes${c}${s} Seconds`;
            if (hrs > 0) return `${hrs} Hours${c}${m} Minutes${c}${s} Seconds`;
            return `${String(m).padStart(2,'0')} Minutes${c}${String(s).padStart(2,'0')} Seconds`;
        }

        setInterval(() => {
            const timeHtml = calculateTimeRemainingHTML();
            const dynamicCounters = document.querySelectorAll('.slide-countdown-timer');
            dynamicCounters.forEach(el => el.innerHTML = timeHtml);
        }, 1000);

        // Slide logic
        let currentSlideIdx = 0;
        let isPaused = false;
        let slideInterval;
        let progressInterval;

        function nextSlide() {
            const slides = document.querySelectorAll('.slide');
            if(slides.length === 0) return;
            slides[currentSlideIdx].classList.remove('active');
            currentSlideIdx = (currentSlideIdx + 1) % slides.length;
            slides[currentSlideIdx].classList.add('active');
            startSlideTimer(parseInt(slides[currentSlideIdx].getAttribute('data-duration')) || 30000);
        }

        function prevSlide() {
            const slides = document.querySelectorAll('.slide');
            if(slides.length === 0) return;
            slides[currentSlideIdx].classList.remove('active');
            currentSlideIdx = (currentSlideIdx + slides.length - 1) % slides.length;
            slides[currentSlideIdx].classList.add('active');
            startSlideTimer(parseInt(slides[currentSlideIdx].getAttribute('data-duration')) || 30000);
        }

        function toggleSlidePlay() {
            isPaused = !isPaused;
            const btn = document.getElementById('play-pause-btn');
            btn.innerText = isPaused ? '▶' : '⏸';
            if (isPaused) {
                clearInterval(slideInterval);
                clearInterval(progressInterval);
            } else {
                const slides = document.querySelectorAll('.slide');
                if(slides.length > 0) startSlideTimer(parseInt(slides[currentSlideIdx].getAttribute('data-duration')) || 30000);
            }
        }

        function renderSlides(slidesData) {
            const disabledList = state.disabledSlides || [];
            const visibleSlides = slidesData.filter(s => !disabledList.includes(s.title));
            
            if (visibleSlides.length === 0) return;

            // Render ALL slides to DOM first
            slidesWrapper.innerHTML = visibleSlides.map((slide, i) => {
                const timeHtml = slide.type === 'countdown' ? calculateTimeRemainingHTML() : '';
                
                // Use BackgroundImage if available, otherwise fallback to imageUrl
                const bgImg = safeUrl(slide.backgroundImage || slide.imageUrl);
                const overlayImg = safeUrl(slide.overlayImage);
                const avatarImg = safeUrl(slide.avatarImage || slide.imageUrl); // For avatar type
                
                const bgStyle = bgImg ? `background-image: url('${bgImg}'); background-size: cover; background-position: center;` : '';
                
                return `
                    <div class="slide ${i === currentSlideIdx ? 'active' : ''}" style="${bgStyle}" data-duration="${slide.duration}">
                        ${bgImg ? '<div class="slide-image-overlay"></div>' : ''}
                        
                        ${overlayImg ? `<div class="slide-overlay-img-container" style="position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 1;">
                            <img src="${overlayImg}" style="max-width: 80%; max-height: 80%; object-fit: contain;">
                        </div>` : ''}

                        ${slide.title ? `<h1 style="position: relative; z-index: 2;">${sanitize(slide.title)}</h1>` : ''}
                        ${slide.subtitle ? `<h2 class="slide-subtitle" style="position: relative; z-index: 2;">${sanitize(slide.subtitle)}</h2>` : ''}
                        
                        ${slide.type === 'countdown' 
                            ? `<div class="slide-countdown slide-countdown-timer" style="position: relative; z-index: 2;">${timeHtml}</div>` 
                            : ''
                        }
                        
                        ${slide.type === 'avatar' 
                            ? `<div class="avatar-container" style="position: relative; z-index: 5;">
                                 ${(String(slide.bubbleText || '').trim() || String(slide.subtitle || '').trim()) 
                                    ? `<div class="speech-bubble">${sanitize(slide.bubbleText || slide.subtitle)}</div>` 
                                    : ''}
                                 <img src="${avatarImg || (window.MMR_CONFIG && window.MMR_CONFIG.AVATAR_FALLBACK) || 'avatar.png'}" class="animated-avatar" alt="Character Avatar">
                               </div>` 
                            : ''
                        }

                        ${slide.type === 'winners' 
                            ? `<div class="winners-carousel" style="position: relative; z-index: 3; width: 100%; height: 400px; display: flex; justify-content: center; align-items: center;">
                                 ${(slide.winnerPhotos || '').split(',').map(url => url.trim()).filter(url => url).map((url, idx) => `
                                    <img src="${safeUrl(url)}" style="width: 500px; height: 500px; object-fit: cover; border-radius: 2rem; border: 8px solid var(--primary); box-shadow: 0 0 50px var(--primary-glow); animation-delay: ${idx * 2}s;">
                                 `).join('')}
                               </div>` 
                            : ''
                        }
                    </div>
                `;
            }).join('');

            // Safety boundary check
            if (currentSlideIdx >= visibleSlides.length) currentSlideIdx = 0;

            startSlideTimer(visibleSlides[currentSlideIdx].duration);
        }

        function startSlideTimer(duration) {
            clearInterval(slideInterval);
            clearInterval(progressInterval);
            
            let start = Date.now();
            progressBar.style.width = '0%';
            
            progressInterval = setInterval(() => {
                let elapsed = Date.now() - start;
                let percent = (elapsed / duration) * 100;
                progressBar.style.width = Math.min(percent, 100) + '%';
            }, 50);

            if (isPaused) return;

            slideInterval = setInterval(() => {
                if (isPaused) return;
                const slides = document.querySelectorAll('.slide');
                if(slides.length === 0) return;
                
                slides[currentSlideIdx].classList.remove('active');
                currentSlideIdx = (currentSlideIdx + 1) % slides.length;
                slides[currentSlideIdx].classList.add('active');
                
                const nextDur = parseInt(slides[currentSlideIdx].getAttribute('data-duration')) || 30000;
                startSlideTimer(nextDur);
            }, duration);
        }

        // Draw Logic
        let rollInterval;
        function startLotteryRoll() {
            lottoNumberEl.classList.add('rolling');
            document.getElementById('view-draw').classList.add('draw-flash-bg');
            rollInterval = setInterval(() => {
                lottoNumberEl.innerText = Math.floor(Math.random() * 999) + 1;
            }, 50);
        }

        function stopLotteryRoll(finalNumber) {
            clearInterval(rollInterval);
            lottoNumberEl.classList.remove('rolling');
            
            const drawView = document.getElementById('view-draw');
            drawView.classList.remove('draw-flash-bg');
            drawView.classList.add('winner-gold-bg');
            setTimeout(() => drawView.classList.remove('winner-gold-bg'), 2500);
            
            lottoNumberEl.innerText = finalNumber;
            triggerConfetti();

            // Announcer Voice - AFTER number is shown
            const cfg = window.MMR_CONFIG;
            const voiceOn = localStorage.getItem('mmr_voice_on') !== 'false'; // default on
            if ('speechSynthesis' in window && voiceOn) {
                window.speechSynthesis.cancel();
                const msg = new SpeechSynthesisUtterance("Ticket number " + finalNumber + "!");
                msg.volume = 1;
                msg.rate = (cfg && cfg.VOICE_RATE) || 0.9;
                msg.pitch = (cfg && cfg.VOICE_PITCH) || 0.8;
                // Use a small delay to ensure the DOM has painted the number
                setTimeout(() => window.speechSynthesis.speak(msg), 150);
            }
        }

        // Confetti Logic
        function triggerConfetti() {
            confettiContainer.innerHTML = '';
            const symbols = ['🥩', '🥓', '🍗', '🍖', 'LOGO'];
            for (let i = 0; i < 60; i++) {
                const symbol = symbols[Math.floor(Math.random() * symbols.length)];
                const el = document.createElement('div');
                el.style.position = 'absolute';
                el.style.top = '-100px';
                el.style.left = Math.random() * 100 + '%';
                el.style.fontSize = '3rem';
                el.style.filter = 'drop-shadow(0 5px 15px rgba(0,0,0,0.5))';
                el.style.zIndex = Math.random() > 0.5 ? 60 : 40;
                
                if (symbol === 'LOGO') {
                    const img = document.createElement('img');
                    img.src = 'logo-new.png';
                    img.style.width = '4rem';
                    img.style.height = 'auto';
                    el.appendChild(img);
                } else {
                    el.innerText = symbol;
                }

                // Animation
                const duration = Math.random() * 3 + 2;
                const delay = Math.random() * 2;
                el.style.transition = `transform ${duration}s linear, opacity ${duration}s ease-in`;
                
                confettiContainer.appendChild(el);
                
                setTimeout(() => {
                    el.style.transform = `translateY(120vh) rotate(${Math.random() * 360}deg)`;
                    el.style.opacity = '0';
                }, delay * 1000 + 50);

                setTimeout(() => el.remove(), (duration + delay) * 1000 + 100);
            }
        }

        // Ambient Slide Confetti
        const ambientContainer = document.getElementById('ambient-confetti-container');
        function spawnAmbientConfetti() {
            if (state.activeView !== 'slides') return;
            const symbols = ['🥩', '🥓', '🍗', '🍖', 'LOGO'];
            const symbol = symbols[Math.floor(Math.random() * symbols.length)];
            const el = document.createElement('div');
            el.className = 'ambient-confetti';
            el.style.top = '-100px';
            el.style.left = Math.random() * 100 + '%';
            el.style.fontSize = Math.random() * 2 + 2 + 'rem';
            el.style.filter = 'drop-shadow(0 5px 15px rgba(0,0,0,0.3))';
            el.style.opacity = Math.random() * 0.4 + 0.2; // subtle opacity for background
            
            if (symbol === 'LOGO') {
                const img = document.createElement('img');
                img.src = 'logo-new.png';
                img.style.width = '3rem';
                img.style.height = 'auto';
                img.style.opacity = '0.8';
                el.appendChild(img);
            } else {
                el.innerText = symbol;
            }

            const duration = Math.random() * 6.25 + 10; // 25% slower (10 to 16.25 seconds)
            el.style.transition = `transform ${duration}s linear`;
            ambientContainer.appendChild(el);
            
            setTimeout(() => {
                el.style.transform = `translateY(120vh) rotate(${Math.random() * 360}deg)`;
            }, 50);

            setTimeout(() => el.remove(), duration * 1000 + 100);
        }
        setInterval(spawnAmbientConfetti, 355); // ambient loop (increasing density by another 50%)

        // Initialization and Google Sheets Sync
        function splitCSVLine(line) {
            const parts = [];
            let current = '';
            let inQuotes = false;
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                if (char === '"') inQuotes = !inQuotes;
                else if (char === ',' && !inQuotes) {
                    parts.push(current.trim());
                    current = '';
                } else current += char;
            }
            parts.push(current.trim());
            return parts;
        }

        function parseSlidesCSV(text) {
            const rows = text.split(/\r?\n/).filter(line => line.trim());
            if (rows.length < 2) return [];

            const parsed = rows.slice(1).map(line => {
                const parts = splitCSVLine(line);
                const clean = parts.map(p => p.replace(/^"|"$/g, '').trim());

                const type = (clean[2] || 'normal').toLowerCase();
                if (!clean[0] && type !== 'avatar') return null; // Ignore rows with no title (except avatar slides)

                return {
                    title: clean[0],
                    subtitle: clean[1] || '',
                    type: (clean[2] || 'normal').toLowerCase(),
                    duration: parseInt(clean[3]) || 30000,
                    backgroundImage: clean[4] || '',
                    overlayImage: clean[5] || '',
                    bubbleText: clean[6] || '',
                    winnerPhotos: clean[7] || '' // For carousel
                };
            }).filter(s => s !== null);

            // Avatar is now handled directly via Google Sheets!
            // (Just add a row with type: 'avatar')

            return parsed;
        }

        const DEFAULT_SLIDES_URL = (window.MMR_CONFIG && window.MMR_CONFIG.GSHEETS_URL) || '';

        async function fetchAndApplySlides() {
            const slidesUrl = DEFAULT_SLIDES_URL;
            console.log('[MMR] Fetching slides from:', slidesUrl);
            try {
                const res = await fetch(slidesUrl + (slidesUrl.includes('?') ? '&' : '?') + 't=' + Date.now(), { cache: 'no-store' });
                if (!res.ok) throw new Error('HTTP ' + res.status);
                const csv = await res.text();
                let slides = parseSlidesCSV(csv);

                // Inject local overrides if defined
                if (window.MMR_CONFIG && window.MMR_CONFIG.LOCAL_WINNERS_SLIDES) {
                    slides = [...slides, ...window.MMR_CONFIG.LOCAL_WINNERS_SLIDES];
                }

                if (slides.length > 0) {
                    console.log('[MMR] Slides synced OK — ' + slides.length + ' slides loaded.');
                    updateState({ slides: slides });
                    // Persist only the slides key — don't clobber draw state
                    const currentStored = localStorage.getItem('mmr_state_v5');
                    let fullState = currentStored ? JSON.parse(currentStored) : state;
                    fullState.slides = slides;
                    localStorage.setItem('mmr_state_v5', JSON.stringify(fullState));
                } else {
                    console.warn('[MMR] Slides fetch returned 0 rows — keeping current slides.');
                }
            } catch (e) {
                console.error('[MMR] Slides sync failed:', e);
            }
        }

        async function init() {
            // Apply Config Visuals
            const cfg = window.MMR_CONFIG;
            if (cfg) {
                const root = document.documentElement;
                if (cfg.COLORS.primary) root.style.setProperty('--cfg-primary', cfg.COLORS.primary);
                if (cfg.COLORS.primaryGlow) root.style.setProperty('--cfg-primary-glow', cfg.COLORS.primaryGlow);
                if (cfg.COLORS.bgDark) root.style.setProperty('--cfg-bg-dark', cfg.COLORS.bgDark);
                if (cfg.COLORS.bgGrad) root.style.setProperty('--cfg-bg-grad', cfg.COLORS.bgGrad);
                if (cfg.COLORS.textLight) root.style.setProperty('--cfg-text-light', cfg.COLORS.textLight);
                
                const fixedTitle = document.getElementById('fixed-title-main');
                if (fixedTitle) {
                    fixedTitle.innerHTML = `${cfg.EVENT_NAME}<br><span style="font-size: 0.6em;">${cfg.EVENT_SUBTITLE}</span>`;
                }
                
                const logo = document.getElementById('logo');
                if (logo && cfg.LOGO_PATH) logo.src = cfg.LOGO_PATH;
            }

            // 1. Show stored state immediately
            const storedState = localStorage.getItem('mmr_state_v5');
            if (storedState) {
                try { 
                    const parsed = JSON.parse(storedState);
                    // Check if saved draw time is in the past
                    if (parsed.nextDrawTime && new Date(parsed.nextDrawTime).getTime() < getNZDate().getTime()) {
                        parsed.nextDrawTime = getNextThursday7PM();
                    }
                    updateState(parsed); 
                } catch(e){}
            } else {
                updateState(state);
            }

            // 2. Then immediately pull fresh slides from Sheets
            await fetchAndApplySlides();

            // 3. Re-sync every 5 minutes so slides stay current without a page reload
            setInterval(fetchAndApplySlides, 5 * 60 * 1000);
        }

        init();

        // ── Firebase cross-device sync (optional) ──────────────────────────
        let fbDbUrl = (window.MMR_CONFIG && window.MMR_CONFIG.FIREBASE_DB_URL) || '';
        let lastFbCmdTs = 0;

        function initFirebase() {
            try {
                if (!fbDbUrl) return;
                listenFirebaseState();
                console.log('[MMR] Firebase RTDB connected:', fbDbUrl);
            } catch(e) { console.error('[MMR] Firebase init error:', e); }
        }

        function listenFirebaseState() {
            const es = new EventSource(`${fbDbUrl}/mmr.json`);
            es.addEventListener('put', handleFbEvent);
            es.addEventListener('patch', handleFbEvent);
            es.onerror = () => { es.close(); setTimeout(listenFirebaseState, 5000); };
        }

        function handleFbEvent(e) {
            try {
                const eventData = JSON.parse(e.data);
                const data = eventData.data || eventData; // Handle both PUT and PATCH
                if (!data) return;

                // Handle voice toggle
                if (data.voiceOn !== undefined) {
                    localStorage.setItem('mmr_voice_on', data.voiceOn);
                }

                // Handle slide commands
                if (data.slideCmd && data.slideCmd.ts > (state.lastSlideCmdTs || 0)) {
                    state.lastSlideCmdTs = data.slideCmd.ts;
                    handleSlideCmd(data.slideCmd.cmd);
                }

                // Handle draw commands
                if (data.cmd && data.cmd.ts > lastFbCmdTs) {
                    lastFbCmdTs = data.cmd.ts;
                    if (data.cmd.type === 'START_ROLL') startLotteryRoll();
                    else if (data.cmd.type === 'STOP_ROLL') stopLotteryRoll(data.cmd.number);
                    else if (data.cmd.type === 'CONFETTI') triggerConfetti();
                }
                // Handle state changes (exclude control keys)
                const { cmd, slideCmd, voiceOn, ...stateData } = data;
                if (Object.keys(stateData).length) updateState(stateData);
            } catch(err) {
                console.error('[MMR] Firebase event processing error:', err);
            }
        }

        initFirebase();

    </script>
</body>
</html>
