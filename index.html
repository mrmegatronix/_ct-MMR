<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monster Meat Raffle - Display</title>
    <!-- Tailwind CSS for styling (via CDN for simplicity since we removed node_modules, but wait, the user wants pure HTML. Pure CSS is better for no dependencies, or Tailwind CDN) -->
    <!-- Actually, let's use pure CSS to keep it 100% dependency-free and robust. -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');

        :root {
            --primary: #ef4444; /* Red */
            --primary-glow: rgba(239, 68, 68, 0.6);
            --bg-dark: #020617; /* Slate 950 */
            --bg-grad: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
            --text-light: #f8fafc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg-dark);
            color: var(--text-light);
            font-family: 'Outfit', sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Branding Top Left */
        .brand-logo {
            position: absolute;
            top: 2rem;
            left: 2rem;
            width: 165px;
            z-index: 1000;
            filter: drop-shadow(0 0 20px rgba(0,0,0,0.8));
        }

        /* Global Countdown (Hidden as per request, now a slide) */
        .global-countdown {
            display: none;
        }

        /* Container for Views */
        #view-container {
            flex: 1;
            position: relative;
            background: var(--bg-grad);
        }

        .view {
            position: absolute;
            inset: 0;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1s ease-in-out;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .view.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* --- SLIDES VIEW --- */
        .slide {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            opacity: 0;
            transform: scale(1.05);
            transition: opacity 1.5s ease-in-out, transform 1.5s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 4rem;
            padding-top: 25vh; /* heavily push content down to avoid header */
        }
        .slide.active { opacity: 1; transform: scale(1); }

        .slides-fixed-title {
            position: absolute;
            top: 3vmin;
            width: 100%;
            text-align: center;
            font-size: clamp(3.168rem, 9.504vmin, 7.92rem);
            font-weight: 900;
            line-height: 1.1;
            color: #f8fafc;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            text-shadow: 0 0 20px var(--primary-glow), 0 0 40px var(--primary-glow), 0 5px 20px rgba(0,0,0,0.8);
            z-index: 100;
            animation: title-pulse 3s infinite ease-in-out;
        }

        .slide-subtitle {
            font-size: clamp(1.4rem, 6vmin, 5.5rem);
            color: #fff8f0;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            text-shadow: 0 0 10px var(--primary-glow), 0 0 20px var(--primary-glow), 0 2px 12px rgba(0,0,0,0.95);
            margin-top: 1rem;
            animation: subtitle-pulse 3s infinite ease-in-out;
            text-wrap: balance;
            max-width: 85%;
            line-height: 1.3;
            position: relative;
            z-index: 2;
        }

        .slide-countdown {
            font-size: clamp(1.6rem, 5.5vmin, 5rem);
            font-weight: 900;
            color: white;
            text-shadow: 0 0 20px var(--primary-glow), 0 0 40px var(--primary-glow), 0 10px 20px rgba(0,0,0,0.5);
            margin-top: 1rem;
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.02em;
            white-space: nowrap;
            position: relative;
            z-index: 2;
        }

        @keyframes title-pulse {
            0%, 100% { text-shadow: 0 0 20px var(--primary-glow), 0 0 40px var(--primary-glow), 0 5px 20px rgba(0,0,0,0.8); }
            50% { text-shadow: 0 0 30px var(--primary), 0 0 60px var(--primary-glow), 0 5px 20px rgba(0,0,0,0.8); }
        }

        @keyframes subtitle-pulse {
            0%, 100% { text-shadow: 0 0 10px var(--primary-glow), 0 0 20px var(--primary-glow), 0 2px 12px rgba(0,0,0,0.95); }
            50% { text-shadow: 0 0 20px var(--primary), 0 0 40px var(--primary-glow), 0 2px 12px rgba(0,0,0,0.95); }
        }

        @keyframes colon-flash {
            0%, 49.9% { opacity: 1; }
            50%, 100% { opacity: 0; }
        }
        .colon-flash {
            animation: colon-flash 1s step-start infinite;
            display: inline-block;
            margin: 0 0.2em;
            color: var(--primary);
        }

        .ambient-confetti {
            position: absolute;
            pointer-events: none;
            z-index: 10;
        }

        .slide h1 {
            font-size: clamp(3.3rem, 11.88vmin, 10.56rem);
            font-weight: 900;
            color: white;
            text-transform: uppercase;
            line-height: 1.1;
            text-shadow: 0 0 20px var(--primary-glow), 0 0 40px var(--primary-glow), 0 2px 10px rgba(0,0,0,0.9);
            margin-bottom: 1.5rem;
            position: relative;
            z-index: 2;
            text-wrap: balance;
            max-width: 90%;
        }
        .slide .highlight { 
            color: white; 
            text-shadow: 0 0 15px var(--primary-glow), 0 0 30px var(--primary-glow);
        }
        .slide-image-overlay {
            position: absolute;
            inset: 0;
            background: rgba(2, 6, 23, 0.65);
            z-index: 1;
        }

        /* Avatar styling */
        .avatar-container {
            margin-top: 3rem;
            position: relative;
            z-index: 5;
            display: flex;
            justify-content: center;
        }
        .animated-avatar {
            width: 380px;
            height: 380px;
            object-fit: contain;
            border-radius: 50%;
            border: 6px solid var(--primary);
            box-shadow: 0 0 40px var(--primary-glow), 0 0 80px rgba(0,0,0,0.8);
            animation: float 4s ease-in-out infinite;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        .speech-bubble {
            position: absolute;
            top: -60px;
            right: -100px;
            background: white;
            color: #020617;
            padding: 1rem 1.5rem;
            border-radius: 20px;
            font-weight: 800;
            font-size: 1.5rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            animation: float-bubble 4s ease-in-out infinite;
            z-index: 10;
        }
        .speech-bubble::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 30px;
            border-width: 15px 15px 0 0;
            border-style: solid;
            border-color: white transparent transparent transparent;
        }
        @keyframes float-bubble {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* Progress Bar */
        #progress-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.05);
            z-index: 100;
        }
        #progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ef4444, #f87171);
            box-shadow: 0 0 15px var(--primary);
            transition: width 0.1s linear;
        }

        /* --- DRAW VIEW --- */
        .lottery-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
            z-index: 10;
        }
        .draw-title { 
            font-size: 4.4vmin; 
            font-weight: 900; 
            color: white; 
            text-transform: uppercase; 
            text-shadow: 0 0 15px var(--primary-glow);
        }
        .number-display {
            font-size: 24vmin;
            font-weight: 900;
            color: white;
            text-shadow: 0 0 30px var(--primary), 0 0 80px var(--primary-glow), 0 0 120px var(--primary);
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(20px);
            padding: 3vmin 8vmin;
            border-radius: 4rem;
            border: 6px solid var(--primary);
            box-shadow: 0 0 50px var(--primary-glow), inset 0 0 30px var(--primary-glow);
            min-width: 600px;
            text-align: center;
            line-height: 1;
            animation: epic-pulse 2s infinite alternate;
        }
        @keyframes epic-pulse {
            from { text-shadow: 0 0 30px var(--primary), 0 0 80px var(--primary-glow), 0 0 120px var(--primary); box-shadow: 0 0 50px var(--primary-glow), inset 0 0 30px var(--primary-glow); transform: scale(1); }
            to { text-shadow: 0 0 50px #fff, 0 0 100px var(--primary), 0 0 150px var(--primary); box-shadow: 0 0 80px var(--primary), inset 0 0 50px var(--primary-glow); transform: scale(1.05); }
        }
        .number-display.rolling {
            animation: slot-blur 0.1s infinite alternate;
            color: #ffffff;
            text-shadow: 0 0 20px rgba(255,255,255,0.8);
            border-color: rgba(255,255,255,0.4);
            box-shadow: 0 0 30px rgba(255,255,255,0.2);
            transform: scale(1);
        }
        @keyframes slot-blur {
            from { transform: scale(0.98) translateY(-8px); filter: blur(2px); }
            to { transform: scale(1.02) translateY(8px); filter: blur(4px); }
        }

        .draw-flash-bg::after {
            content: ''; position: absolute; inset: 0; pointer-events: none;
            animation: draw-spotlight 0.3s infinite alternate;
            z-index: 1;
        }
        @keyframes draw-spotlight {
            from { box-shadow: inset 0 0 50px rgba(239, 68, 68, 0.3); background: rgba(239,68,68,0.05); }
            to { box-shadow: inset 0 0 300px rgba(239, 68, 68, 0.8); background: rgba(239,68,68,0.15); }
        }
        
        .winner-gold-bg::after {
            content: ''; position: absolute; inset: 0; pointer-events: none;
            animation: gold-flash 2.5s ease-out forwards;
            z-index: 1;
        }
        @keyframes gold-flash {
            0% { box-shadow: inset 0 0 500px rgba(255,215,0,0.8); background: rgba(255,215,0,0.4); }
            100% { box-shadow: inset 0 0 0 rgba(255,215,0,0); background: transparent; }
        }

        .drawn-numbers-bar {
            position: absolute;
            bottom: 2rem;
            left: 2rem;
            right: 2rem;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            padding: 1.5rem;
            border-radius: 1rem;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .drawn-numbers-bar .title { font-size: 1.32rem; color: #94a3b8; text-transform: uppercase; font-weight: 700; }
        .drawn-list {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: center;
            font-size: 2.2rem;
            font-weight: 700;
            color: #fff;
        }
        .drawn-list span {
            background: var(--primary);
            padding: 0.5rem 1.5rem;
            border-radius: 0.5rem;
            box-shadow: 0 0 10px var(--primary-glow);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .prizes-left {
            position: absolute;
            top: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            padding: 1rem 3rem;
            border-radius: 2rem;
            border: 2px solid var(--primary);
            text-align: center;
            box-shadow: 0 0 20px var(--primary-glow);
        }
        .prizes-left .label { 
            font-size: 1.32rem; 
            color: white; 
            text-transform: uppercase; 
            font-weight: 700; 
            text-shadow: 0 0 10px var(--primary-glow);
        }
        .prizes-left .value { 
            font-size: 3.8rem; 
            font-weight: 900; 
            color: white; 
            text-shadow: 0 0 20px #fff, 0 0 40px var(--primary), 0 0 60px var(--primary-glow);
            animation: prizes-glow 2s infinite alternate;
        }
        @keyframes prizes-glow {
            from { text-shadow: 0 0 10px #fff, 0 0 20px var(--primary); }
            to { text-shadow: 0 0 25px #fff, 0 0 50px var(--primary), 0 0 80px var(--primary); }
        }

        /* --- CONGRATS VIEW --- */
        .congrats-title {
            font-size: 12vmin;
            font-weight: 900;
            color: white;
            text-shadow: 0 0 30px var(--primary-glow), 0 0 60px var(--primary-glow);
            text-transform: uppercase;
            text-align: center;
            margin-bottom: 2rem;
            animation: bounce 2s infinite;
            line-height: 1.1;
        }
        .congrats-subtitle {
            font-size: 5vmin;
            color: #fff;
            text-shadow: 0 0 15px var(--primary-glow);
            text-align: center;
            max-width: 80%;
            line-height: 1.4;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        /* Confetti Canvas */
        #confetti-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 50;
        }
    </style>
</head>
<body>

    <img src="logo-new.png" alt="Logo" class="brand-logo" id="logo">

    <div id="view-container">
        
        <!-- SLIDES VIEW -->
        <div id="view-slides" class="view active">
            <!-- Ambient Slides Confetti -->
            <div id="ambient-confetti-container" style="position: absolute; inset: 0; pointer-events: none; overflow: hidden; z-index: 5;"></div>
            
            <div class="slides-fixed-title">Monster Meat Raffle<br><span style="font-size: 0.6em;">weekly on Thursdays</span></div>
            <div id="slides-wrapper"></div>
            <div id="progress-container"><div id="progress-bar"></div></div>
        </div>

        <!-- DRAW VIEW -->
        <div id="view-draw" class="view">
            <div class="prizes-left">
                <div class="label">Prizes Left</div>
                <div class="value" id="prizes-count">0</div>
            </div>
            
            <div class="lottery-container">
                <div class="draw-title">Winning Number</div>
                <div class="number-display" id="lottery-number">---</div>
            </div>

            <div class="drawn-numbers-bar">
                <div class="title">Previously Drawn Numbers</div>
                <div class="drawn-list" id="drawn-list">
                    <!-- Numbers go here -->
                </div>
            </div>
        </div>

        <!-- CONGRATS VIEW -->
        <div id="view-congrats" class="view">
            <div class="congrats-title">Congratulations<br>to all the winners</div>
            <div class="congrats-subtitle">Thank you to all who participated.<br>We hope to see you all next Thursday!</div>
        </div>

    </div>

    <!-- Confetti logic -->
    <div id="confetti-container" style="position: absolute; inset: 0; pointer-events: none; z-index: 50; overflow: hidden;"></div>

    <script>
        function getNZDate() {
            const parts = new Intl.DateTimeFormat('en-US', {
                timeZone: 'Pacific/Auckland',
                year: 'numeric', month: 'numeric', day: 'numeric',
                hour: 'numeric', minute: 'numeric', second: 'numeric',
                hourCycle: 'h23'
            }).formatToParts(new Date());
            const v = {};
            parts.forEach(p => v[p.type] = p.value);
            return new Date(v.year, v.month - 1, v.day, v.hour, v.minute, v.second);
        }

        function getNextThursday7PM() {
            const nzDate = getNZDate();
            let daysUntilThursday = (4 + 7 - nzDate.getDay()) % 7;
            if (daysUntilThursday === 0 && nzDate.getHours() >= 19) {
                daysUntilThursday = 7;
            }
            nzDate.setDate(nzDate.getDate() + daysUntilThursday);
            
            const yr = nzDate.getFullYear();
            const mo = String(nzDate.getMonth() + 1).padStart(2, '0');
            const da = String(nzDate.getDate()).padStart(2, '0');
            return `${yr}-${mo}-${da}T19:00`;
        }

        // State
        let state = {
            activeView: 'slides', // slides, draw, congrats
            nextDrawTime: getNextThursday7PM(),
            slides: [
                { title: "Next Draw:", subtitle: "", type: "countdown", duration: 30000 },
                { title: "Get Your Tickets:", subtitle: "Thursdays from 5.30pm", duration: 30000 },
                { title: "Tickets:", subtitle: "1x for $5 or 5x for $20", duration: 30000 },
                { title: "This Weeks Prize Pool:", subtitle: "62x Assorted Meat Trays Valued @ $1300.00", duration: 30000 },
                { title: "Prize Values:", subtitle: "2x $100, 4x $50, 6x $25, & 50x $15", duration: 30000 },
                { title: "Last Weeks Draw:", subtitle: "62x Meat Trays Valued @ $1225.00", duration: 30000 },
                { title: "Event made possible by:", subtitle: "Coasters Tavern", duration: 30000 },
                { title: "Meat Trays supplied by:", subtitle: "Hibbards Butchery", duration: 30000 },
                { title: "EASTER BONUS PRIZE", subtitle: "auto-entry for all non-winning tickets", duration: 30000 },
                { title: "Thanks for coming!", subtitle: "Enjoy the Meat Raffle!", type: "avatar", duration: 15000 }
            ],
            draw: {
                isRolling: false,
                currentNumber: '---',
                drawnNumbers: [],
                prizesLeft: 62
            }
        };

        // DOM Elements
        const views = {
            slides: document.getElementById('view-slides'),
            draw: document.getElementById('view-draw'),
            congrats: document.getElementById('view-congrats')
        };
        const slidesWrapper = document.getElementById('slides-wrapper');
        const progressBar = document.getElementById('progress-bar');
        const lottoNumberEl = document.getElementById('lottery-number');
        const drawnListEl = document.getElementById('drawn-list');
        const prizesCountEl = document.getElementById('prizes-count');
        const confettiContainer = document.getElementById('confetti-container');

        // Broadcast Channel setup
        const bc = new BroadcastChannel('mmr_sync');
        bc.onmessage = (event) => {
            const data = event.data;
            if (data.type === 'STATE_UPDATE') {
                updateState(data.payload);
            }
            if (data.type === 'START_ROLL') {
                startLotteryRoll();
            }
            if (data.type === 'STOP_ROLL') {
                stopLotteryRoll(data.payload.number);
            }
            if (data.type === 'CONFETTI') {
                triggerConfetti();
            }
        };

        function updateState(newState) {
            // Deep merge draw object if present
            if (newState.draw) {
                state.draw = { ...state.draw, ...newState.draw };
                delete newState.draw;
            }
            state = { ...state, ...newState };
            
            // View switching
            Object.keys(views).forEach(k => {
                if (k === state.activeView) views[k].classList.add('active');
                else views[k].classList.remove('active');
            });

            // Slides rendering
            if (state.activeView === 'slides') {
                renderSlides(state.slides);
            }

            // Draw rendering
            prizesCountEl.innerText = state.draw.prizesLeft;
            
            // Only update drawn list if it changed
            if (drawnListEl.children.length !== state.draw.drawnNumbers.length) {
                drawnListEl.innerHTML = state.draw.drawnNumbers.map(n => `<span>${n}</span>`).join('');
            }

            // Persist to localStorage
            localStorage.setItem('mmr_state_v5', JSON.stringify(state));
        }

        // Live Clock logic for dynamic values
        function calculateTimeRemainingHTML() {
            if (!state.nextDrawTime) return '<span>Starting Soon!</span>';
            const target = new Date(state.nextDrawTime); 
            const nzNow = getNZDate();
            
            const diff = target.getTime() - nzNow.getTime();
            if (diff <= 0) return '<span>Starting Now!</span>';
            
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hrs = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const m = Math.floor((diff / 1000 / 60) % 60);
            const s = Math.floor((diff / 1000) % 60);
            
            const c = '<span class="colon-flash">:</span>';
            
            if (days > 0) return `${days} Days${c}${hrs} Hours${c}${m} Minutes${c}${s} Seconds`;
            if (hrs > 0) return `${hrs} Hours${c}${m} Minutes${c}${s} Seconds`;
            return `${String(m).padStart(2,'0')} Minutes${c}${String(s).padStart(2,'0')} Seconds`;
        }

        setInterval(() => {
            const timeHtml = calculateTimeRemainingHTML();
            const dynamicCounters = document.querySelectorAll('.slide-countdown-timer');
            dynamicCounters.forEach(el => el.innerHTML = timeHtml);
        }, 1000);

        // Slide logic
        let currentSlideIdx = 0;
        let slideInterval;
        let progressInterval;

        function renderSlides(slidesData) {
            const disabledList = state.disabledSlides || [];
            const visibleSlides = slidesData.filter(s => !disabledList.includes(s.title));
            
            if (visibleSlides.length === 0) return;

            // Render ALL slides to DOM first
            slidesWrapper.innerHTML = visibleSlides.map((slide, i) => {
                const timeHtml = slide.type === 'countdown' ? calculateTimeRemainingHTML() : '';
                const bgStyle = slide.imageUrl ? `background-image: url('${slide.imageUrl}'); background-size: cover; background-position: center;` : '';
                return `
                    <div class="slide ${i === currentSlideIdx ? 'active' : ''}" style="${bgStyle}" data-duration="${slide.duration}">
                        ${slide.imageUrl ? '<div class="slide-image-overlay"></div>' : ''}
                        <h1>${slide.title}</h1>
                        <h2 class="slide-subtitle">${slide.subtitle}</h2>
                        ${slide.type === 'countdown' 
                            ? `<div class="slide-countdown slide-countdown-timer">${timeHtml}</div>` 
                            : ''
                        }
                        ${slide.type === 'avatar' 
                            ? `<div class="avatar-container">
                                 ${slide.subtitle ? `<div class="speech-bubble">${slide.subtitle}</div>` : ''}
                                 <img src="${slide.imageUrl || 'avatar.png'}" class="animated-avatar" alt="Character Avatar">
                               </div>` 
                            : ''
                        }
                    </div>
                `;
            }).join('');

            // Safety boundary check
            if (currentSlideIdx >= visibleSlides.length) currentSlideIdx = 0;

            startSlideTimer(visibleSlides[currentSlideIdx].duration);
        }

        function startSlideTimer(duration) {
            clearInterval(slideInterval);
            clearInterval(progressInterval);
            
            let start = Date.now();
            progressBar.style.width = '0%';
            
            progressInterval = setInterval(() => {
                let elapsed = Date.now() - start;
                let percent = (elapsed / duration) * 100;
                progressBar.style.width = Math.min(percent, 100) + '%';
            }, 50);

            slideInterval = setInterval(() => {
                const slides = document.querySelectorAll('.slide');
                if(slides.length === 0) return;
                
                slides[currentSlideIdx].classList.remove('active');
                currentSlideIdx = (currentSlideIdx + 1) % slides.length;
                slides[currentSlideIdx].classList.add('active');
                
                const nextDur = parseInt(slides[currentSlideIdx].getAttribute('data-duration')) || 30000;
                startSlideTimer(nextDur);
            }, duration);
        }

        // Draw Logic
        let rollInterval;
        function startLotteryRoll() {
            lottoNumberEl.classList.add('rolling');
            document.getElementById('view-draw').classList.add('draw-flash-bg');
            rollInterval = setInterval(() => {
                lottoNumberEl.innerText = Math.floor(Math.random() * 999) + 1;
            }, 50);
        }

        function stopLotteryRoll(finalNumber) {
            clearInterval(rollInterval);
            lottoNumberEl.classList.remove('rolling');
            
            const drawView = document.getElementById('view-draw');
            drawView.classList.remove('draw-flash-bg');
            drawView.classList.add('winner-gold-bg');
            setTimeout(() => drawView.classList.remove('winner-gold-bg'), 2500);
            
            lottoNumberEl.innerText = finalNumber;
            triggerConfetti();

            // Announcer Voice
            if ('speechSynthesis' in window) {
                // Cancel any currently speaking voices
                window.speechSynthesis.cancel();
                const msg = new SpeechSynthesisUtterance("Ticket number " + finalNumber + "!");
                msg.voiceURI = 'native';
                msg.volume = 1;
                msg.rate = 0.9;
                msg.pitch = 0.8;
                window.speechSynthesis.speak(msg);
            }
        }

        // Confetti Logic
        function triggerConfetti() {
            confettiContainer.innerHTML = '';
            const symbols = ['🥩', '🥓', '🍗', '🍖', 'LOGO'];
            for (let i = 0; i < 60; i++) {
                const symbol = symbols[Math.floor(Math.random() * symbols.length)];
                const el = document.createElement('div');
                el.style.position = 'absolute';
                el.style.top = '-100px';
                el.style.left = Math.random() * 100 + '%';
                el.style.fontSize = '3rem';
                el.style.filter = 'drop-shadow(0 5px 15px rgba(0,0,0,0.5))';
                el.style.zIndex = Math.random() > 0.5 ? 60 : 40;
                
                if (symbol === 'LOGO') {
                    const img = document.createElement('img');
                    img.src = 'logo-new.png';
                    img.style.width = '4rem';
                    img.style.height = 'auto';
                    el.appendChild(img);
                } else {
                    el.innerText = symbol;
                }

                // Animation
                const duration = Math.random() * 3 + 2;
                const delay = Math.random() * 2;
                el.style.transition = `transform ${duration}s linear, opacity ${duration}s ease-in`;
                
                confettiContainer.appendChild(el);
                
                setTimeout(() => {
                    el.style.transform = `translateY(120vh) rotate(${Math.random() * 360}deg)`;
                    el.style.opacity = '0';
                }, delay * 1000 + 50);

                setTimeout(() => el.remove(), (duration + delay) * 1000 + 100);
            }
        }

        // Ambient Slide Confetti
        const ambientContainer = document.getElementById('ambient-confetti-container');
        function spawnAmbientConfetti() {
            if (state.activeView !== 'slides') return;
            const symbols = ['🥩', '🥓', '🍗', '🍖', 'LOGO'];
            const symbol = symbols[Math.floor(Math.random() * symbols.length)];
            const el = document.createElement('div');
            el.className = 'ambient-confetti';
            el.style.top = '-100px';
            el.style.left = Math.random() * 100 + '%';
            el.style.fontSize = Math.random() * 2 + 2 + 'rem';
            el.style.filter = 'drop-shadow(0 5px 15px rgba(0,0,0,0.3))';
            el.style.opacity = Math.random() * 0.4 + 0.2; // subtle opacity for background
            
            if (symbol === 'LOGO') {
                const img = document.createElement('img');
                img.src = 'logo-new.png';
                img.style.width = '3rem';
                img.style.height = 'auto';
                img.style.opacity = '0.8';
                el.appendChild(img);
            } else {
                el.innerText = symbol;
            }

            const duration = Math.random() * 6.25 + 10; // 25% slower (10 to 16.25 seconds)
            el.style.transition = `transform ${duration}s linear`;
            ambientContainer.appendChild(el);
            
            setTimeout(() => {
                el.style.transform = `translateY(120vh) rotate(${Math.random() * 360}deg)`;
            }, 50);

            setTimeout(() => el.remove(), duration * 1000 + 100);
        }
        setInterval(spawnAmbientConfetti, 355); // ambient loop (increasing density by another 50%)

        // Initialization and Google Sheets Sync
        function splitCSVLine(line) {
            const parts = [];
            let current = '';
            let inQuotes = false;
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                if (char === '"') inQuotes = !inQuotes;
                else if (char === ',' && !inQuotes) {
                    parts.push(current.trim());
                    current = '';
                } else current += char;
            }
            parts.push(current.trim());
            return parts;
        }

        function parseSlidesCSV(text) {
            const rows = text.split(/\r?\n/).filter(line => line.trim());
            if (rows.length < 2) return [];

            const parsed = rows.slice(1).map(line => {
                const parts = splitCSVLine(line);
                const clean = parts.map(p => p.replace(/^"|"$/g, ''));

                return {
                    title: clean[0] || 'Untitled',
                    subtitle: clean[1] || '',
                    type: (clean[2] || 'normal').toLowerCase(),
                    duration: parseInt(clean[3]) || 30000,
                    imageUrl: clean[4] || ''
                };
            }).filter(s => s.title);

            // Avatar is now handled directly via Google Sheets!
            // (Just add a row with type: 'avatar')

            return parsed;
        }

        const DEFAULT_SLIDES_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQMXn3GlWIeGLKc3XqYXFSi_ofevUW4JZtptUoDoyzapOQCmoDSdC96QRZf0EXpWQ8CYoJ7YJ5h5Boy/pub?output=csv';

        async function init() {
            const storedState = localStorage.getItem('mmr_state_v5');
            if (storedState) {
                try { updateState(JSON.parse(storedState)); } catch(e){}
            } else {
                updateState(state); // trigger initial render with defaults
            }

            // Always fetch fresh slides from Google Sheets (skip cache)
            let slidesUrl = DEFAULT_SLIDES_URL;
            const adminCfg = localStorage.getItem('mmr_admin_config');
            if (adminCfg) {
                try {
                    const cfg = JSON.parse(adminCfg);
                    if (cfg.slidesUrl) slidesUrl = cfg.slidesUrl;
                } catch(e) {}
            }

            if (slidesUrl) {
                try {
                    const res = await fetch(slidesUrl + (slidesUrl.includes('?') ? '&' : '?') + 't=' + Date.now(), { cache: 'no-store' });
                    const csv = await res.text();
                    const slides = parseSlidesCSV(csv);
                    if (slides.length > 0) {
                        updateState({ slides: slides });
                        const currentStored = localStorage.getItem('mmr_state_v5');
                        let fullState = currentStored ? JSON.parse(currentStored) : state;
                        fullState.slides = slides;
                        localStorage.setItem('mmr_state_v5', JSON.stringify(fullState));
                    }
                } catch (e) {
                    console.error("Failed to auto-sync slides:", e);
                }
            }
        }

        init();

        // ── Firebase cross-device sync (optional) ──────────────────────────
        let fbDbUrl = 'https://ct-mmr-default-rtdb.firebaseio.com';
        let lastFbCmdTs = 0;

        function initFirebase() {
            try {
                const cfgStr = localStorage.getItem('mmr_firebase_config');
                if (cfgStr) {
                    const cfg = JSON.parse(cfgStr);
                    if (cfg.databaseURL) fbDbUrl = cfg.databaseURL;
                }
                fbDbUrl = fbDbUrl.replace(/\/$/, '');
                if (!fbDbUrl) return;
                listenFirebaseState();
                console.log('[MMR] Firebase RTDB connected:', fbDbUrl);
            } catch(e) { console.error('[MMR] Firebase init error:', e); }
        }

        function listenFirebaseState() {
            const es = new EventSource(`${fbDbUrl}/mmr.json`);
            es.addEventListener('put', handleFbEvent);
            es.addEventListener('patch', handleFbEvent);
            es.onerror = () => { es.close(); setTimeout(listenFirebaseState, 5000); };
        }

        function handleFbEvent(e) {
            try {
                const { data } = JSON.parse(e.data);
                if (!data || typeof data !== 'object') return;
                // Handle draw commands
                if (data.cmd && data.cmd.ts > lastFbCmdTs) {
                    lastFbCmdTs = data.cmd.ts;
                    if (data.cmd.type === 'START_ROLL') startLotteryRoll();
                    else if (data.cmd.type === 'STOP_ROLL') stopLotteryRoll(data.cmd.number);
                    else if (data.cmd.type === 'CONFETTI') triggerConfetti();
                }
                // Handle state changes (exclude cmd key)
                const { cmd, ...stateData } = data;
                if (Object.keys(stateData).length) updateState(stateData);
            } catch(err) {}
        }

        initFirebase();

    </script>
</body>
